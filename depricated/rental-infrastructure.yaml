---
# 1. ENVIRONMENT VARIABLES
apiVersion: v1
kind: ConfigMap
metadata:
  name: rental-config
data:
  # Points to the internal K8s DNS name for the database!
  MONGODB_URI: "mongodb://mongo-service:27017/rental_db"
  PORT: "4000"
---
apiVersion: v1
kind: Secret
metadata:
  name: rental-secrets
type: Opaque
stringData:
  SESSION_SECRET: "k8s_production_session_secret"
  JWT_SECRET: "k8s_production_jwt_secret"
---
# 2. PERSISTENT STORAGE (The Virtual USB Drive)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 3. DATABASE DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
        volumeMounts: # <--- Plugging the drive into Mongo
        - name: mongo-storage
          mountPath: /data/db
      volumes: # <--- Defining the drive
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
spec:
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017
---
# 4. BACKEND DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2 # Edge Case: High Availability. If one dies, the other takes traffic.
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: rental-backend:v1
        imagePullPolicy: Never # Forces K8s to use your local build
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: rental-config
        - secretRef:
            name: rental-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
  - port: 4000
    targetPort: 4000
---
# 5. FRONTEND DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: rental-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
spec:
  type: NodePort # Exposes the frontend to your Windows browser
  selector:
    app: client
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000