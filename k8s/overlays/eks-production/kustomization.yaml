apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rental

resources:
  - ../../base
  - cluster-issuer.yaml
  - external-secrets.yaml

patches:
  - path: patch-ingress.yaml
  - path: patch-api-deployment.yaml
  - path: patch-client-deployment.yaml
  - path: patch-configmap.yaml

images:
  - name: ghcr.io/your-org/rental-backend
    newName: ghcr.io/your-org/rental-backend
    newTag: v1.0.0
  - name: ghcr.io/your-org/rental-frontend
    newName: ghcr.io/your-org/rental-frontend
    newTag: v1.0.0