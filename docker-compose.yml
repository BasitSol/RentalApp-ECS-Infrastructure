version: "3.8"

services:
  # Service name MUST match the hostname in nginx.conf: proxy_pass http://api-service:80/api/;
  api-service:
    build: ./api-staging
    ports:
    env_file:
      - ./.env
      - "4000:4000"
    restart: unless-stopped
    # Runtime environment variables — injected from host, NEVER baked into the image
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=4000
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - SESSION_COOKIE_SAME_SITE=${SESSION_COOKIE_SAME_SITE:-lax}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    build:
      context: ./client-staging
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      api-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s